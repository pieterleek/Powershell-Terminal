<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />    
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="Veilige PowerShell toetsomgeving voor studenten." />
    <meta name="author" content="Pieter Leek" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <title>Gegevens | PowerShell Toetsomgeving</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-box">
        <h2>Studentgegevens</h2>
        <p>Vul je naam en klas in voor de docent.</p>
        
        <form method="POST" action="/details">
            <input type="text" name="naam" placeholder="Jouw volledige naam" autofocus required />
            <input type="text" name="klas" placeholder="Jouw klas (bijv. BO4IC2A)" required />
            <button type="submit">Start PowerShell</button>
        </form>
    </div>
</body>
</html>
