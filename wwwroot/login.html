<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />    
    <meta name="robots" content="noindex, nofollow" />

    <title>Inloggen | PowerShell Toetsomgeving</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-box">
        <h2>PowerShell Toetsomgeving voor geweldige studenten</h2>
        <p>Voer het wachtwoord in om door te gaan.</p>
        
        <form method="POST" action="/login">
            <input type="password" name="password" placeholder="Wachtwoord" autofocus required />
            <button type="submit">Inloggen</button>
        </form>
    </div>

</body>
